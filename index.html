<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Before You Spend</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>Spin Before You Spend</h1>
      <p class="tagline">About to buy something you don't need? Spin the wheel for a better use of that money.</p>
    </header>

    <section class="wheel-section">
      <div class="wheel-wrapper">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheel" width="520" height="520"></canvas>
        <button id="spin-btn" type="button">SPIN</button>
      </div>

      <div id="result" class="result" aria-live="polite">
        <span class="result-label">Your better use of money:</span>
        <span id="result-text" class="result-text">Give it a spin.</span>
      </div>
    </section>

    <section class="options-section">
      <h2>Wheel options</h2>
      <p class="hint">Add or remove things that genuinely matter to you. Saved to this browser.</p>

      <form id="add-form" class="add-form">
        <input
          id="add-input"
          type="text"
          placeholder="e.g. Pay down credit card"
          maxlength="60"
          autocomplete="off"
          required
        />
        <button type="submit">Add</button>
      </form>

      <ul id="options-list" class="options-list"></ul>

      <div class="actions">
        <button id="reset-btn" type="button" class="secondary">Reset to defaults</button>
      </div>
    </section>

    <footer>
      <p>Future you says thanks.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
